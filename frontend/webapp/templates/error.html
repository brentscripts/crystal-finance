{% extends "base.html" %}

{% block nav_items %}
<li><a href="{{ url_for('index') }}">Home</a></li>
{% endblock %}

{% block content %}
<div class="error-container">
  <h1 class="error-title">{{ title or "Something went wrong" }}</h1>
  <p class="error-message">{{ message or "An error occurred. Please try again." }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
</div>
{% endblock %}
