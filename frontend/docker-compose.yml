services:
  pyfmgr:
    build:
      context: .
      args:
        REQUIREMENTS: requirements.txt  # Swap with requirements-dev.txt for dev mode
    image: pyfmgr:latest
    ports:
      - "${HOST_PORT}:5000"          # Map host port to container port
    volumes:
      - ./:/app                        # Mount your entire project root
      - ./.env:/app/.env                     # Mounting your env file
    env_file:
      - .env                                 # Load environment variables cleanly
    environment:
      FLASK_ENV: production
      DATABASE: /app/finance.db         # Ensure app uses correct DB path
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  finance_data:
