version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: finance-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${HOST_PORT}:3306"             # Expose container MySQL on host
    volumes:
      - finance_data:/var/lib/mysql     # Persistent storage
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql  # Optional schema
    restart: unless-stopped

volumes:
  finance_data:
